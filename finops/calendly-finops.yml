specification: FinOps Framework
specificationVersion: '1.0'
schema: https://www.finops.org/framework/
provider: Calendly
providerId: calendly
created: '2026-05-04'
modified: '2026-05-05'
reconciled: true
tags:
  - Scheduling
  - SaaS
  - FinOps
  - FOCUS
description: 'FOCUS-aligned FinOps for Calendly: per-seat SaaS subscription priced monthly or annually,
  with an enterprise floor of $15,000/year. The cost shape is dominated by seat count; API and webhook
  usage are not separately metered against the customer.'
sources:
  - https://calendly.com/pricing
  - https://developer.calendly.com/api-docs
  - https://focus.finops.org/focus-specification/v1-3/
alignedWith:
  framework: FinOps Foundation Framework
  frameworkUrl: https://www.finops.org/framework/
  dataSpec: FOCUS
  dataSpecVersion: '1.3'
  dataSpecUrl: https://focus.finops.org/focus-specification/v1-3/
publisherName: Calendly, LLC
serviceCategory: Productivity / Scheduling SaaS
billingModel:
  pricingCategory: Tiered Subscription
  billingFrequency: Monthly or Annual
  billingCurrency: USD
  chargeCategories:
    - Purchase
    - Tax
    - Adjustment
    - Refund
focusColumns:
  ServiceName: Calendly
  ServiceCategory: Productivity / Scheduling
  ProviderName: Calendly
  PublisherName: Calendly, LLC
  InvoiceIssuerName: Calendly, LLC
  BillingCurrency: USD
  PricingCategory: Subscription
  PricingUnit: seat
  ChargeCategory: Purchase
meters:
  - name: seats
    description: Number of paid seats on the account in a billing month.
    unit: seat
    aggregation: max
    dimensions:
      - plan
      - billing_term
  - name: plan_subscription
    description: The recurring monthly or annual fee for the chosen plan tier.
    unit: month
    aggregation: sum
    dimensions:
      - plan
      - billing_term
  - name: enterprise_minimum
    description: Annual contract floor for the Enterprise plan ($15,000/year baseline).
    unit: year
    aggregation: sum
    dimensions:
      - contract_id
  - name: addon_sso_saml
    description: SSO/SAML add-on (priced separately on Standard and Teams; included in Enterprise).
    unit: month
    aggregation: sum
    dimensions:
      - plan
  - name: api_requests
    description: Volume of v2 Scheduling API calls. Not directly billed but tracked for capacity and rate-limit
      observability.
    unit: request
    aggregation: sum
    dimensions:
      - endpoint
      - oauth_app
  - name: webhook_deliveries
    description: Outbound webhook POSTs. Not directly billed but tracked for delivery-success accounting.
    unit: event
    aggregation: sum
    dimensions:
      - subscription
      - event_type
principles:
  - name: Visibility
    description: Use the Calendly admin billing page and the Organization API to see active seat counts,
      plan tier, and renewal date. Pull invoices from the customer billing portal monthly.
  - name: Allocation
    description: Allocate seats by department or cost-center using Calendly groups; tag OAuth applications
      to product teams so API-driven scheduling can be attributed back to the consuming product.
  - name: Optimization
    description: Reclaim inactive seats before each renewal; right-size between Standard and Teams based
      on whether Salesforce routing and round-robin events are actually used; negotiate Enterprise floor
      only when seat count warrants it (typically 75+ seats at Teams pricing).
  - name: Accountability
    description: Designate a workspace owner per organization, route renewal alerts to procurement 60+
      days ahead of the annual term, and review seat utilization quarterly with department leads.
maintainers:
  - FN: API Evangelist
    url: http://apievangelist.com
    email: info@apievangelist.com
