specification: API Commons Plans
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/Plans
provider: Calendly
providerId: calendly
created: '2026-05-04'
modified: '2026-05-05'
reconciled: true
tags:
  - Scheduling
  - Appointments
  - Calendars
  - SaaS
description: 'Calendly is a per-seat SaaS scheduling product. Pricing is tiered: a perpetual Free tier
  for personal use, a Standard tier at $10/seat/month (annual), a Teams tier at $16/seat/month (annual),
  and an Enterprise tier starting at $15,000/year with custom contracts. The Scheduling API and webhooks
  are available on Standard, Teams and Enterprise — the Free plan does not expose API access. SSO/SAML
  is included in Enterprise and available as an add-on on Standard/Teams.'
sources:
  - https://calendly.com/pricing
  - https://developer.calendly.com/api-docs
plans:
  - id: calendly-free
    name: Free
    type: freemium
    description: Free personal-use plan. Includes 1 active event type and 1 calendar connection. No API
      or webhook access.
    entries:
      - label: Seat
        name: seat
        type: subscription
        metric: seat
        limit: 1
        timeFrame: month
        geo: global
        unit: 1
        price: '$0'
        userMultiplied: true
      - label: Active Event Types
        name: event_types
        type: quota
        metric: event_types
        limit: 1
        timeFrame: usage
        geo: global
        unit: 1
        price: included
        userMultiplied: false
      - label: Calendar Connections
        name: calendar_connections
        type: quota
        metric: calendars
        limit: 1
        timeFrame: usage
        geo: global
        unit: 1
        price: included
        userMultiplied: false
    elements:
      - name: 1 Active Event Type
      - name: 1 Calendar Connection
      - name: Email Notifications
      - name: Branded Booking Page
  - id: calendly-standard
    name: Standard
    type: subscription
    description: Per-seat plan for professionals and small teams. Unlocks Scheduling API and webhook access,
      Zapier, and unlimited event types. $10/seat/month billed annually (16% savings versus monthly).
    entries:
      - label: Seat (annual billing)
        name: seat_annual
        type: subscription
        metric: seat
        limit: 1
        timeFrame: month
        geo: global
        unit: 1
        price: '$10/seat/month (billed annually)'
        userMultiplied: true
      - label: Calendar Connections
        name: calendar_connections
        type: quota
        metric: calendars
        limit: 6
        timeFrame: usage
        geo: global
        unit: 1
        price: included
        userMultiplied: false
      - label: Active Event Types
        name: event_types
        type: quota
        metric: event_types
        limit: -1
        timeFrame: usage
        geo: global
        unit: 1
        price: included
        userMultiplied: false
    elements:
      - name: Scheduling API Access
      - name: Webhooks
      - name: Zapier Integrations
      - name: Unlimited Event Types
      - name: 6 Calendar Connections
      - name: SSO/SAML (Add-on)
  - id: calendly-teams
    name: Teams
    type: subscription
    description: Per-seat plan for growing businesses. Adds Salesforce routing, round-robin and team-based
      scheduling. $16/seat/month billed annually (20% savings versus monthly).
    entries:
      - label: Seat (annual billing)
        name: seat_annual
        type: subscription
        metric: seat
        limit: 1
        timeFrame: month
        geo: global
        unit: 1
        price: '$16/seat/month (billed annually)'
        userMultiplied: true
      - label: Calendar Connections
        name: calendar_connections
        type: quota
        metric: calendars
        limit: 6
        timeFrame: usage
        geo: global
        unit: 1
        price: included
        userMultiplied: false
    elements:
      - name: Everything in Standard
      - name: Salesforce Routing
      - name: Round-robin Events
      - name: Managed Events
      - name: SSO/SAML (Add-on)
  - id: calendly-enterprise
    name: Enterprise
    type: enterprise
    description: Custom-priced plan for large organizations. Starts at $15,000/year. Includes SSO/SAML,
      data governance controls, dedicated CSM, and contractual SLAs.
    entries:
      - label: Annual Contract
        name: annual_contract
        type: subscription
        metric: year
        limit: 1
        timeFrame: year
        geo: global
        unit: 1
        price: starting at $15,000/year (custom)
        userMultiplied: false
    elements:
      - name: Everything in Teams
      - name: SSO/SAML (included)
      - name: Salesforce + Microsoft Dynamics integrations
      - name: Audit Logs
      - name: Dedicated Customer Success Manager
      - name: Contractual SLA
      - name: Sandbox Environment
maintainers:
  - FN: API Evangelist
    url: http://apievangelist.com
    email: info@apievangelist.com
