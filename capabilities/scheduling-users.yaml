naftiko: 1.0.0-alpha2
info:
  label: Calendly Scheduling API — Users
  description: 'Calendly Scheduling API — Users. 2 operations. Lead operation: Get current user. Self-contained Naftiko capability
    covering one Calendly business surface.'
  tags:
  - Calendly
  - Users
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    CALENDLY_API_KEY: CALENDLY_API_KEY
capability:
  consumes:
  - type: http
    namespace: scheduling-users
    baseUri: https://api.calendly.com
    description: Calendly Scheduling API — Users business capability. Self-contained, no shared references.
    resources:
    - name: users-me
      path: /users/me
      operations:
      - name: getcurrentuser
        method: GET
        description: Get current user
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: users-uuid
      path: /users/{uuid}
      operations:
      - name: getuser
        method: GET
        description: Get user
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: bearer
      token: '{{env.CALENDLY_API_KEY}}'
  exposes:
  - type: rest
    namespace: scheduling-users-rest
    port: 8080
    description: REST adapter for Calendly Scheduling API — Users. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/users/me
      name: users-me
      description: REST surface for users-me.
      operations:
      - method: GET
        name: getcurrentuser
        description: Get current user
        call: scheduling-users.getcurrentuser
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/users/{uuid}
      name: users-uuid
      description: REST surface for users-uuid.
      operations:
      - method: GET
        name: getuser
        description: Get user
        call: scheduling-users.getuser
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: scheduling-users-mcp
    port: 9090
    transport: http
    description: MCP adapter for Calendly Scheduling API — Users. One tool per consumed operation, routed inline through this
      capability's consumes block.
    tools:
    - name: get-current-user
      description: Get current user
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: scheduling-users.getcurrentuser
      outputParameters:
      - type: object
        mapping: $.
    - name: get-user
      description: Get user
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: scheduling-users.getuser
      outputParameters:
      - type: object
        mapping: $.
