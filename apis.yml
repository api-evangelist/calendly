    url: json-ld/calendly-context.jsonld
  - type: JSONSchema
    url: json-schema/calendly-event-type-schema.json
  - type: JSONSchema
    url: json-schema/calendly-scheduled-event-schema.json
  - type: JSONSchema
    url: json-schema/calendly-invitee-schema.json
